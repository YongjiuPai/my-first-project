name: daily-pet-news-push

on:
  schedule:
    - cron: '40 0 * * *' 
  workflow_dispatch: 
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检查代码内容
        uses: actions/checkout@v3
      - name: 安装运行环境(Python)
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: 安装必要的工具包
        run: pip install requests
      - name: 运行机器人脚本
        env:
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }} # 名字改成了QWEN
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: python main.py
